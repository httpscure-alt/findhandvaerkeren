<!DOCTYPE html>
<html lang="da">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>Kontakt | Advero</title>
    <link rel="icon" href="/brand/advero-logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="/brand/advero-logo.png" />
    <meta name="description" content="Kontakt Advero. Fortæl om jeres virksomhed og få næste skridt uden salgs-pres." />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://advero.dk/contact" />
    <script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'slate-blue': '#334155',
              'neutral-gray': '#64748B',
              'deep-graphite': '#334155',
            },
            spacing: {
              'margin-page': '40px',
              'container-max': '1280px',
              'stack-sm': '8px',
              'stack-md': '16px',
              'stack-lg': '32px',
              'stack-xl': '64px',
            },
            fontFamily: {
              headline: ['Inter', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'sans-serif'],
              mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'monospace'],
            },
          },
        },
      };
    </script>
    <style>
      html {
        scroll-padding-top: 5.75rem;
        scroll-behavior: smooth;
      }
      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto;
        }
      }
      html,
      body {
        background-color: #334155;
      }
      .mono-label {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-size: 0.75rem;
      }
      .advero-btn-slate-solid {
        background: linear-gradient(165deg, #64748b 0%, #334155 52%, #334155 100%);
        color: #ffffff !important;
        box-shadow: 0 14px 44px -14px rgba(51, 65, 85, 0.55);
      }
      .advero-btn-slate-solid:hover {
        filter: brightness(1.04);
      }
      /* Match homepage wordmark scale without changing header padding. */
      #brand-home-link {
        display: inline-flex;
        align-items: center;
        padding: 0;
        line-height: 0;
        overflow: visible;
      }
      #brand-home-link .advero-logo-wordmark-light {
        height: 3rem;
        width: auto;
        max-width: none;
        transform: scale(2.28);
        transform-origin: left center;
      }
      @media (min-width: 640px) {
        #brand-home-link .advero-logo-wordmark-light {
          height: 3.25rem;
          transform: scale(2.22);
        }
      }
      @media (min-width: 768px) {
        #brand-home-link .advero-logo-wordmark-light {
          height: 3.375rem;
          transform: scale(2.16);
        }
      }
      @media (min-width: 1024px) {
        #brand-home-link .advero-logo-wordmark-light {
          height: 3.625rem;
          transform: scale(2.3);
        }
      }
      .ds-card-surface {
        border-radius: 1.15rem;
        border: 1px solid rgb(255 255 255 / 0.13);
        background: linear-gradient(152deg, rgb(255 255 255 / 0.11) 0%, rgb(255 255 255 / 0.03) 45%, rgb(15 23 42 / 0.42) 100%);
        box-shadow: inset 0 1px 0 rgb(255 255 255 / 0.1), 0 20px 50px -34px rgb(0 0 0 / 0.55);
      }
      .page-stage {
        position: relative;
        overflow: hidden;
      }
      .page-stage::before {
        content: '';
        position: absolute;
        inset: -20%;
        pointer-events: none;
        background:
          radial-gradient(ellipse 50% 38% at 18% 18%, rgba(125, 211, 252, 0.18), transparent 60%),
          radial-gradient(ellipse 55% 44% at 78% 22%, rgba(165, 180, 252, 0.12), transparent 62%),
          radial-gradient(ellipse 55% 40% at 48% 72%, rgba(251, 191, 36, 0.08), transparent 62%);
        filter: blur(10px);
        opacity: 0.9;
      }
    </style>
  </head>
  <body class="font-headline antialiased text-white/90">
    <header class="sticky top-0 z-20 border-b border-white/[0.1] bg-slate-blue/70 backdrop-blur-2xl">
      <div class="mx-auto flex max-w-container-max items-center justify-between gap-4 px-margin-page py-4 sm:py-5">
        <a id="brand-home-link" href="/" class="flex items-center gap-3">
          <img
            alt=""
            width="800"
            height="168"
            decoding="async"
            src="/brand/advero-logo-light.png"
            class="advero-logo-wordmark-light object-contain object-left"
          />
        </a>
        <div class="flex flex-wrap items-center justify-end gap-3">
          <a
            href="/advero/login"
            class="rounded-full border border-white/15 bg-white/5 px-4 py-2 text-[12px] font-semibold uppercase tracking-[0.16em] text-white/85 backdrop-blur transition hover:bg-white/10"
            data-i18n="nav.login"
            >Log ind</a
          >
          <a
            href="/pricing"
            class="rounded-full border border-white/15 bg-white/5 px-4 py-2 text-[12px] font-semibold uppercase tracking-[0.16em] text-white/85 backdrop-blur transition hover:bg-white/10"
            data-i18n="nav.plans"
            >Plans</a
          >
          <a
            href="/how-it-works"
            class="rounded-full border border-white/15 bg-white/5 px-4 py-2 text-[12px] font-semibold uppercase tracking-[0.16em] text-white/85 backdrop-blur transition hover:bg-white/10"
            data-i18n="nav.how"
            >How we work</a
          >
        </div>
      </div>
    </header>

    <main class="page-stage">
      <section class="relative mx-auto w-full max-w-container-max px-margin-page pb-stack-xl pt-[clamp(2.75rem,7vh,5rem)]">
        <div class="mx-auto max-w-[46rem]">
          <div class="text-center">
            <div class="mono-label mx-auto inline-flex items-center gap-2 text-[10px] font-semibold tracking-[0.2em] text-white/55" data-i18n="kicker">
              Reach out
            </div>
            <h1 class="mt-6 text-pretty text-[clamp(2.25rem,6vw,3.75rem)] font-semibold leading-[1.02] tracking-[-0.05em] text-white" data-i18n="title">
              Tell us about your business
            </h1>
            <p class="mx-auto mt-5 max-w-[40rem] text-[clamp(15px,1.3vw,18px)] leading-[1.7] text-white/70" data-i18n="sub">
              No sales pressure. Just the next concrete step and a plan you can explain.
            </p>
          </div>

          <div class="ds-card-surface mt-10 overflow-hidden p-stack-lg sm:p-stack-xl">
            <form id="contact-form" class="grid grid-cols-1 gap-4 sm:grid-cols-2">
              <label class="block">
                <span class="mono-label block text-[9px] font-semibold uppercase tracking-[0.18em] text-white/55" data-i18n="nameLabel">Name</span>
                <input
                  name="name"
                  required
                  class="mt-2 w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-[14px] text-white placeholder:text-white/35 focus:border-white/25 focus:outline-none"
                  type="text"
                  placeholder="Mette"
                  data-i18n-placeholder="namePh"
                />
              </label>
              <label class="block">
                <span class="mono-label block text-[9px] font-semibold uppercase tracking-[0.18em] text-white/55" data-i18n="emailLabel">Email</span>
                <input
                  name="email"
                  required
                  class="mt-2 w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-[14px] text-white placeholder:text-white/35 focus:border-white/25 focus:outline-none"
                  type="email"
                  placeholder="mette@company.com"
                  data-i18n-placeholder="emailPh"
                />
              </label>
              <label class="block sm:col-span-2">
                <span class="mono-label block text-[9px] font-semibold uppercase tracking-[0.18em] text-white/55" data-i18n="msgLabel">Message</span>
                <textarea
                  name="message"
                  required
                  rows="6"
                  class="mt-2 w-full resize-none rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-[14px] text-white placeholder:text-white/35 focus:border-white/25 focus:outline-none"
                  placeholder="What do you do, and what do you want to achieve over the next 90 days?"
                  data-i18n-placeholder="msgPh"
                ></textarea>
              </label>
              <div class="sm:col-span-2 flex flex-col items-start justify-between gap-3 sm:flex-row sm:items-center">
                <p class="text-[12px] leading-relaxed text-white/50" data-i18n="note">
                  By sending, you agree that we can contact you back by email.
                </p>
                <button
                  type="submit"
                  class="advero-btn-slate-solid inline-flex items-center justify-center rounded-full px-[1.5rem] py-[0.75rem] text-[13px] font-semibold uppercase tracking-[0.14em] shadow-none transition sm:text-[14px]"
                  data-i18n="submit"
                >
                  Send
                </button>
              </div>
            </form>
          </div>

          <div class="mt-stack-lg flex justify-center">
            <a
              href="/"
              class="rounded-full border border-white/15 bg-white/5 px-5 py-2.5 text-[12px] font-semibold uppercase tracking-[0.16em] text-white/85 backdrop-blur transition hover:bg-white/10"
              data-i18n="back"
              >Back to preview</a
            >
          </div>
        </div>
      </section>
    </main>

    <link rel="stylesheet" href="/site/advero-support-widget.css" />
    <script src="/site/advero-support-widget.js" defer></script>
    <script>
      (function () {
        var i18n = {
          da: {
            kicker: 'Ræk ud',
            title: 'Fortæl om jeres forretning',
            sub: 'Ingen salgspres. Kun næste konkrete skridt og en plan du kan forklare videre.',
            nameLabel: 'Navn',
            emailLabel: 'Email',
            msgLabel: 'Besked',
            namePh: 'Mette',
            emailPh: 'mette@firma.dk',
            msgPh: 'Hvad laver I, og hvad vil I gerne opnå de næste 90 dage?',
            note: 'Ved at sende accepterer du, at vi må kontakte dig tilbage på email.',
            submit: 'Send',
            back: 'Tilbage til forsiden',
            'nav.login': 'Log ind',
            'nav.plans': 'Pakker',
            'nav.how': 'Sådan arbejder vi',
          },
          en: {
            kicker: 'Reach out',
            title: 'Tell us about your business',
            sub: 'No sales pressure. Just the next concrete step and a plan you can explain.',
            nameLabel: 'Name',
            emailLabel: 'Email',
            msgLabel: 'Message',
            namePh: 'Mette',
            emailPh: 'mette@company.com',
            msgPh: 'What do you do, and what do you want to achieve over the next 90 days?',
            note: 'By sending, you agree that we can contact you back by email.',
            submit: 'Send',
            back: 'Back to home',
            'nav.login': 'Log in',
            'nav.plans': 'Plans',
            'nav.how': 'How we work',
          },
        };

        function setLang(lang) {
          var dict = i18n[lang] || i18n.da;
          document.documentElement.setAttribute('lang', lang);
          try {
            localStorage.setItem('advero.lang', lang);
            window.dispatchEvent(new CustomEvent('advero:lang', { detail: { lang: lang } }));
          } catch (e) {}
          document.querySelectorAll('[data-i18n]').forEach(function (el) {
            var key = el.getAttribute('data-i18n');
            if (key && typeof dict[key] === 'string') el.textContent = dict[key];
          });
          document.querySelectorAll('[data-i18n-placeholder]').forEach(function (el) {
            var pk = el.getAttribute('data-i18n-placeholder');
            if (pk && typeof dict[pk] === 'string') el.setAttribute('placeholder', dict[pk]);
          });
        }

        var initial = 'da';
        try {
          var stored = localStorage.getItem('advero.lang');
          if (stored === 'en' || stored === 'da') initial = stored;
        } catch (e) {}
        setLang(initial);

        // Mailto submit keeps this page fully disconnected from any host app backend.
        var form = document.getElementById('contact-form');
        if (form) {
          form.addEventListener('submit', function (e) {
            e.preventDefault();
            var fd = new FormData(form);
            var name = String(fd.get('name') || '').trim();
            var email = String(fd.get('email') || '').trim();
            var message = String(fd.get('message') || '').trim();
            var subject = 'Advero Reach out';
            var body = ['Name: ' + name, 'Email: ' + email, '', message].join('\n');
            window.location.href =
              'mailto:hello@advero.dk?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
          });
        }
      })();
    </script>
  </body>
</html>
