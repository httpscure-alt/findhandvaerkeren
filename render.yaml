services:
  # Frontend (Vite)
  - type: web
    name: findhandvaerkeren-web
    runtime: static
    region: frankfurt
    plan: starter
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      # Must include `/api` (the frontend health-check logic expects it)
      - key: VITE_API_URL
        sync: false
      - key: VITE_USE_MOCK_API
        value: "false"

  # Backend (Express + Prisma)
  - type: web
    name: findhandvaerkeren-api
    runtime: node
    region: frankfurt
    plan: starter
    rootDir: backend
    buildCommand: npm ci && npm run db:generate && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production

      # Prisma / Postgres
      - key: DATABASE_URL
        fromDatabase:
          name: findhandvaerkeren-db
          property: connectionString

      # Auth (backend requires this at boot)
      - key: JWT_SECRET
        generateValue: true

      # Email (backend requires these at boot)
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false

      # Stripe (backend requires these at boot)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      # Optional but recommended
      - key: SENTRY_DSN
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: UPLOAD_DIR
        value: uploads

databases:
  - name: findhandvaerkeren-db
    plan: starter
    region: frankfurt
