services:
  # Frontend (Vite)
  - type: web
    name: findhandvaerkeren-web
    runtime: static
    region: frankfurt
    plan: starter
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      # Must include `/api` (the frontend health-check logic expects it)
      - key: VITE_API_URL
        sync: false
      - key: VITE_USE_MOCK_API
        value: "false"

  # Backend (Express + Prisma)
  - type: web
    name: findhandvaerkeren-api
    runtime: node
    region: frankfurt
    plan: starter
    rootDir: backend
    buildCommand: npm ci && npm run db:generate && npx prisma migrate deploy && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production

      # Prisma / Postgres
      - key: DATABASE_URL
        fromDatabase:
          name: findhandvaerkeren-db
          property: connectionString

      # Auth (backend requires this at boot)
      - key: JWT_SECRET
        generateValue: true

      # Email (backend requires these at boot)
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false

      # Stripe (backend requires these at boot)
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      # Advero marketing prices (run backend/scripts/stripeSeedProducts.ts)
      - key: STRIPE_PRICE_SEO_BASIC
        sync: false
      - key: STRIPE_PRICE_SEO_STANDARD
        sync: false
      - key: STRIPE_PRICE_SEO_PRO
        sync: false
      - key: STRIPE_PRICE_ADS_BASIC
        sync: false
      - key: STRIPE_PRICE_ADS_STANDARD
        sync: false
      - key: STRIPE_PRICE_ADS_PRO
        sync: false
      - key: STRIPE_PRICE_GROWTH_BUNDLE
        sync: false
      - key: STRIPE_COUPON_COMBINED_PLAN
        sync: false
      - key: ADVERO_SITE_URL
        sync: false

      # Kimi K2.6 — personalized audit report copy (MOONSHOT_API_KEY from platform.moonshot.ai)
      - key: MOONSHOT_API_KEY
        sync: false
      - key: MOONSHOT_MODEL
        value: kimi-k2.6
      - key: ADVERO_LLM_INTERPRETATION
        value: "false"

      # Google (Search Console + Ads OAuth)
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI
        sync: false
      - key: GOOGLE_ADS_DEVELOPER_TOKEN
        sync: false
      - key: GOOGLE_ADS_LOGIN_CUSTOMER_ID
        sync: false

      # Optional but recommended
      - key: SENTRY_DSN
        sync: false
      - key: CORS_ORIGINS
        value: "https://advero.dk,https://www.advero.dk"
      - key: UPLOAD_DIR
        value: uploads

databases:
  - name: findhandvaerkeren-db
    plan: starter
    region: frankfurt
